version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - simulation

  simulation:
    build: ./simulation
    env_file:
      - .env

  ai:
    build: ./ai
    env_file:
      - .env
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-urban}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-urban}
      - POSTGRES_DB=${POSTGRES_DB:-urban_policy}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
